name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build, test, lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tpt-augur
    steps:
      - uses: actions/checkout@v4
        with:
          path: tpt-augur
      - name: Checkout tpt-locus (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: tpt-solutions/tpt-locus
          path: tpt-locus
      - name: Checkout tpt-keystone-db (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: tpt-solutions/tpt-keystone-db
          path: tpt-keystone-db
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tpt-augur
      - name: Format check
        run: cargo fmt --check
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test
        run: cargo test --workspace --verbose
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  todo-drift-guard:
    name: Verify checked TODO items map to real code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check TODO.md against the codebase
        run: python3 scripts/check_todo.py
